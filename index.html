<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AxionClicker</title>
  <style>
    body {
      background: radial-gradient(circle at center, #111 0%, #000 80%);
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px;
    }
    h1 { font-size: 2em; margin-bottom: 10px; }
    #axion {
      font-size: 100px;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }
    #axion:active { transform: scale(0.95); }
    .shop {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    .item {
      background: rgba(255,255,255,0.1);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 15px;
      width: 180px;
    }
    .item button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      cursor: pointer;
      border: none;
      background: #06f;
      color: white;
      border-radius: 5px;
      font-weight: bold;
    }
    .item button:hover {
      background: #09f;
    }
  </style>
</head>

<body>
  <h1>⚛️ AxionClicker ⚛️</h1>
  <p><strong>Axions :</strong> <span id="axionCount">0</span></p>
  <div id="axion">🧬</div>
  <p>Production : <span id="aps">0</span> /s</p>

  <div class="shop" id="shop"></div>

  <script>
    let axions = 0;
    let aps = 0; // axions par seconde

    const upgrades = [
      { name: "Machine à Axion", baseCost: 10, gain: 1 },
      { name: "Axion Extracteur", baseCost: 100, gain: 10 },
      { name: "Axion Raffinerie", baseCost: 1000, gain: 100 },
      { name: "Axion Industrie", baseCost: 10000, gain: 1000 },
      { name: "Axion Méga-Usine", baseCost: 50000, gain: 5000 },
      { name: "Axion Réacteur", baseCost: 200000, gain: 20000 },
      { name: "Axion Fusion", baseCost: 1e6, gain: 100000 },
      { name: "Laboratoire Quantique", baseCost: 5e6, gain: 500000 },
      { name: "Colonie Spatiale", baseCost: 2e7, gain: 2e6 },
      { name: "Empire Axionique", baseCost: 1e8, gain: 1e7 },
      { name: "Singularité Axion", baseCost: 5e8, gain: 5e7 }
    ];

    const shopEl = document.getElementById('shop');

    // Création visuelle de la boutique
    upgrades.forEach((u, i) => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <h3>${u.name}</h3>
        <p>Production : +${u.gain.toLocaleString()} /s</p>
        <p>Coût : <span id="cost${i}">${u.baseCost.toLocaleString()}</span></p>
        <p>Possédé : <span id="owned${i}">0</span></p>
        <button id="buy${i}">Acheter</button>
      `;
      shopEl.appendChild(div);
      u.owned = 0;
    });

    const countEl = document.getElementById("axionCount");
    const apsEl = document.getElementById("aps");

    document.getElementById("axion").onclick = () => {
      axions++;
      updateDisplay();
    };

    // Acheter un upgrade
    upgrades.forEach((u, i) => {
      document.getElementById(`buy${i}`).onclick = () => {
        if (axions >= u.baseCost) {
          axions -= u.baseCost;
          u.owned++;
          u.baseCost = Math.floor(u.baseCost * 1.1); // +10% à chaque achat
          calcAps();
          updateDisplay();
        }
      };
    });

    function calcAps() {
      aps = upgrades.reduce((sum, u) => sum + u.gain * u.owned, 0);
    }

    function updateDisplay() {
      countEl.textContent = Math.floor(axions).toLocaleString();
      apsEl.textContent = aps.toLocaleString();
      upgrades.forEach((u, i) => {
        document.getElementById(`cost${i}`).textContent = u.baseCost.toLocaleString();
        document.getElementById(`owned${i}`).textContent = u.owned;
      });
    }

    // Génération automatique (10 ticks par seconde)
    setInterval(() => {
      axions += aps / 10;
      updateDisplay();
    }, 100);
  </script>
</body>
</html>
